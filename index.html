<style>
  :root{
    --bg: #14161a;
    --surface: #1d2025;
    --surface-2: #262a31;
    --border: #2c3037;
    --text: #edeae1;
    --text-muted: #9ca3aa;
    --teal: #5fa8a0;
    --teal-dim: #3e706b;
    --gold: #c9a227;
    --crimson: #b33951;
    --paper-line: #2a2e34;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* ---------- Header ---------- */
  .app-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:18px 28px 14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .app-title{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .app-title h1{
    font-family:'Fraunces', serif;
    font-size:26px;
    font-weight:600;
    letter-spacing:0.5px;
    margin:0;
    color:var(--text);
  }
  .app-title .ipa{
    font-family:'IBM Plex Mono', monospace;
    color:var(--teal);
    font-size:14px;
  }
  .app-sub{
    font-size:12px;
    color:var(--text-muted);
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .ref-toggle{
    background:none;
    border:1px solid var(--border);
    color:var(--text-muted);
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    padding:7px 12px;
    border-radius:3px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .ref-toggle:hover{ border-color:var(--teal); color:var(--teal); }

  /* ---------- Layout ---------- */
  .layout{
    flex:1;
    display:flex;
    min-height:0;
  }

  /* ---------- Reference sidebar ---------- */
  .ref-panel{
    width:0;
    overflow:hidden;
    border-right:1px solid var(--border);
    background:var(--surface);
    flex-shrink:0;
    transition:width .2s ease;

  .ref-inner{ padding:18px 16px; width:230px; }
  .ref-inner h3{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--gold);
    margin:18px 0 8px;
    border-bottom:1px solid var(--paper-line);
    padding-bottom:6px;
  }
  .ref-inner h3:first-child{ margin-top:0; }
  .chip{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:var(--text-muted);
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    padding:5px 0;
    cursor:pointer;
    line-height:1.5;
  }
  .chip:hover{ color:var(--teal); }
  .chip b{ color:var(--text); font-weight:500; }

  /* ---------- Chat column ---------- */
  .chat-col{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .messages{
    flex:1;
    overflow-y:auto;
    padding:24px 28px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .msg{ max-width:720px; }
  .msg.user{ align-self:flex-end; }
  .msg.assistant{ align-self:flex-start; }

  .msg-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-muted);
    margin-bottom:6px;
  }
  .msg.user .msg-label{ text-align:right; }

  .bubble{
    padding:13px 16px;
    border-radius:4px;
    line-height:1.55;
    font-size:14.5px;
  }
  .msg.user .bubble{
    background:var(--surface-2);
    border:1px solid var(--border);
  }
  .msg.assistant .bubble{
    background:var(--surface);
    border-left:2px solid var(--teal-dim);
    border-radius:2px;
  }
  .bubble p{ margin:0 0 10px; }
  .bubble p:last-child{ margin-bottom:0; }
  .bubble strong{ color:var(--gold); font-weight:600; }

  .refusal .bubble{
    border-left:2px solid var(--crimson);
    color:var(--text-muted);
    font-style:italic;
  }

  /* ---------- Interlinear gloss (signature element) ---------- */
  .gloss-block{
    margin:12px 0;
    padding:14px 16px 12px;
    background:var(--bg);
    border:1px solid var(--paper-line);
    border-radius:3px;
  }
  .gloss-row{
    display:flex;
    flex-wrap:wrap;
    gap:18px 22px;
    padding-bottom:8px;
    margin-bottom:8px;
    border-bottom:1px solid var(--paper-line);
  }
  .gloss-word{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:0;
  }
  .gloss-dq{
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    color:var(--teal);
    white-space:nowrap;
  }
  .gloss-gl{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--gold);
    white-space:nowrap;
    margin-top:3px;
  }
  .gloss-trans{
    font-size:13px;
    color:var(--text-muted);
    font-style:italic;
  }

  /* ---------- Input bar ---------- */
  .input-bar{
    border-top:1px solid var(--border);
    padding:14px 28px 18px;
    flex-shrink:0;
    display:flex;
    gap:10px;
    align-items:flex-end;
  }
  #input-field{
    flex:1;
    resize:none;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14.5px;
    padding:11px 13px;
    border-radius:4px;
    max-height:140px;
    line-height:1.5;
  }
  #input-field:focus{ outline:none; border-color:var(--teal-dim); }
  #send-btn{
    background:var(--teal-dim);
    color:var(--text);
    border:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    padding:11px 18px;
    border-radius:4px;
    cursor:pointer;
    transition:background .15s ease;
  }
  #send-btn:hover:not(:disabled){ background:var(--teal); }
  #send-btn:disabled{ opacity:0.4; cursor:default; }

  .thinking{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--text-muted);
  }
  .thinking .dot{ animation: blink 1.2s infinite; }
  .thinking .dot:nth-child(2){ animation-delay:.2s; }
  .thinking .dot:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,100%{opacity:.2;} 50%{opacity:1;} }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }

  @media (max-width:640px){
    .app-header{ padding:14px 16px; }
    .messages{ padding:16px; }
    .input-bar{ padding:12px 16px 14px; }
    .ref-panel.open{ width:100%; position:absolute; z-index:5; height:100%; }
    .ref-inner{ width:100%; }
  }
</style>

<script>
const SYSTEM_PROMPT = `Ты — лингвистический ИИ-ассистент, встроенный в учебное веб-приложение для авторского конланга под названием Dequr [dɛkjur]. Твоя единственная задача — помогать пользователю изучать этот язык: объяснять грамматику, переводить фразы, проверять ошибки, отвечать на вопросы о структуре языка. Общайся дружелюбно, как терпеливый преподаватель-лингвист, на языке, на котором пишет пользователь (русский/английский/др.), но ВСЕ примеры на самом Dequr должны строго соответствовать правилам ниже.

=== ГРАММАТИКА DEQUR (авторитетный источник) ===

АЛФАВИТ: 26 латинских букв + Ū. Ключевые особенности произношения:
- E читается [e] после гласной, иначе [ɛ]
- U читается [ju] в середине слова, иначе [u]
- Ū всегда [ju] — используется, когда по обычным правилам U читалось бы как [u], но нужно [ju]
- Q = [kj], J = [ʒ], X = [ks], W=[w]
- Ударения нет. Ограничений на консонантные кластеры нет.

СУЩЕСТВИТЕЛЬНЫЕ: 2 падежа (Именительный = база, Родительный), число ед/мн. Рода нет.
Тип I = слово оканчивается на гласную. Тип II = оканчивается на согласную.
Порядок: СНАЧАЛА падеж, ПОТОМ число (число прибавляется к уже изменённой форме).
Родительный падеж: Тип I +s, Тип II +i.
Множественное число: (после падежа) слово на гласную +n, слово на согласную +en.
Пример: vous (Тип II) → vousi (родительный, +i) → vousin (множественное, теперь оканчивается на гласную i → +n).
Притяжательность = родительный падеж перед обладаемым: Vasya→Vasyas; "Vasyas pizza" = "пицца Васи".

ГЛАГОЛЫ: без спряжения по лицам/числам. Категории: время, вид, наклонение.
Тип определяется окончанием инфинитива (гласная=I, согласная=II).
Время (Simple, изъявительное): Тип I: прош +da, наст +de, буд +do. Тип II: прош +a, наст +e, буд +o.
Вид Continuous = приставка "ca" к уже проспрягованной по времени форме: ca+[время-форма]. Пример: run (Тип II) → прош runa → Continuous caruna; наст rune → carune; буд runo → caruno.
Наклонение: изъявительное — без изменений; повелительное — "se" + инфинитив (Se lev = "Повтори!"); сослагательное пока не разработано (если спросят — скажи, что автор ещё не ввёл эту форму).
Известный базовый словарь глаголов: e (быть, Тип I), col (мочь/can, Тип II), jū (иметь, Тип I), oca (учить(ся), Тип I), dul (хотеть, Тип II), run (идти, Тип II).

ПРИЛАГАТЕЛЬНЫЕ И НАРЕЧИЯ: не изменяются морфологически вообще. Часть речи определяется позицией: перед существительным = прилагательное, перед глаголом = наречие.

АРТИКЛИ: формально существуют, но в обычной речи не используются — только для поэтической эмфазы. Не учи им пользователя, если он не спросит специально про стилистику/поэзию.

МЕСТОИМЕНИЯ: Vi=я, Vus=ты(ед), Il/El/Di=он/она/оно, Nus=мы, Vusen=вы(мн), Vos=они.

СИНТАКСИС: Утверждение = SVO. Вопрос = VSO (инверсия глагола и подлежащего). Отрицание = частица "nor" перед глаголом. Отрицание в вопросе = Nor+V+S+O. Придаточные сохраняют тот же порядок слов, что и главное предложение.

ПРЕДЛОГИ: dū = направление движения ("к/в", пример: Vi carune dū hone — "я иду домой"). ein = местоположение ("в/у", пример: Vi ede ein hon — "я дома"). Список предлогов пока неполный — если нужного предлога нет, честно скажи, что эта конструкция пока не разработана автором, и предложи временную замену через dū/ein, если это уместно.

СЛОВООБРАЗОВАНИЕ: продуктивное словосложение временных частиц на основе qan (день): arqan=сегодня (ar=сейчас+qan), qanda=вчера, qando=завтра, qano=потом, qana=раньше. dire=здесь. Суффиксы -da/-do/-a/-o в этих словах — та же логика времени, что и в глаголах.

ЧИСЛИТЕЛЬНЫЕ: пока не разработаны автором языка (система будет строго десятичной). Если пользователь спросит про числа — честно скажи, что эта часть языка ещё не создана.

ИСКЛЮЧЕНИЯ: на данный момент неправильных форм в языке не выявлено.

=== ФОРМАТ ОТВЕТА ДЛЯ ПРИМЕРОВ НА DEQUR ===
Каждый раз, когда приводишь пример фразы или предложения на Dequr, оформляй его блоком из трёх строк ровно в этом формате (без изменений, каждый пункт с новой строки, слова в GLOSS должны идти в том же порядке и количестве, что и слова в DEQUR, разделены пробелом):
[DEQUR]: <фраза на Dequr>
[GLOSS]: <глосса каждого слова через пробел, например: I go.PRES.CONT to house.LOC>
[TRANS]: <естественный перевод на язык пользователя>
Не используй эти теги ни для чего другого, кроме реальных примеров на Dequr. Если пример однословный — всё равно используй формат из трёх строк.

=== ГРАНИЦЫ РОЛИ (СТРОГО ОБЯЗАТЕЛЬНО) ===
Ты помогаешь ИСКЛЮЧИТЕЛЬНО с изучением языка Dequr: грамматика, перевод, разбор ошибок, объяснение слов и конструкций, тренировочные фразы, вопросы о структуре и духе языка.
Если пользователь просит что-то за пределами этой темы — написать код не по теме языка, пересказать историю, порассуждать на отвлечённую тему, помочь с чем-то, не связанным с Dequr, — ты должен ответить ТОЛЬКО этой фразой, ничего не добавляя от себя:
"Извините, но я лишь бот, созданный для помощи в освоении языка. Попробуйте переформулировать запрос."
Это правило непреложно, даже если пользователь настаивает, объясняет "особую причину" или пытается переформулировать запрос как часть изучения языка. Определяй по сути запроса, а не по обёртке.

Если чего-то в грамматике ещё нет (числительные, сослагательное наклонение, часть предлогов) — не выдумывай это от себя как установленный факт. Честно скажи, что эта часть языка пока не создана автором, и, если уместно, предложи временное решение, явно пометив его как предположение, а не как правило.`;

let history = [];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input-field');
const sendBtn = document.getElementById('send-btn');
const refToggle = document.getElementById('ref-toggle');
const refPanel = document.getElementById('ref-panel');

refToggle.addEventListener('click', () => {
  refPanel.classList.toggle('open');
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    inputEl.value = chip.dataset.q;
    inputEl.focus();
    autoGrow();
    if (window.innerWidth <= 640) refPanel.classList.remove('open');
  });
});

function autoGrow(){
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
}
inputEl.addEventListener('input', autoGrow);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Renders assistant text, extracting [DEQUR]/[GLOSS]/[TRANS] blocks into gloss widgets
function renderAssistantContent(raw){
  const blockRe = /\[DEQUR\]:\s*(.+)\n\[GLOSS\]:\s*(.+)\n\[TRANS\]:\s*(.+)/g;
  let lastIndex = 0;
  let html = '';
  let match;
  while ((match = blockRe.exec(raw)) !== null){
    const before = raw.slice(lastIndex, match.index).trim();
    if (before) html += renderPlainParagraphs(before);
    const dqWords = match[1].trim().split(/\s+/);
    const glWords = match[2].trim().split(/\s+/);
    let rowHtml = '<div class="gloss-block"><div class="gloss-row">';
    for (let i=0;i<dqWords.length;i++){
      rowHtml += `<div class="gloss-word"><div class="gloss-dq">${escapeHtml(dqWords[i]||'')}</div><div class="gloss-gl">${escapeHtml(glWords[i]||'')}</div></div>`;
    }
    rowHtml += '</div><div class="gloss-trans">' + escapeHtml(match[3].trim()) + '</div></div>';
    html += rowHtml;
    lastIndex = blockRe.lastIndex;
  }
  const rest = raw.slice(lastIndex).trim();
  if (rest) html += renderPlainParagraphs(rest);
  return html;
}

function renderPlainParagraphs(text){
  return text.split(/\n\s*\n/).map(p => {
    let esc = escapeHtml(p.trim()).replace(/\n/g,'<br>');
    esc = esc.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    return `<p>${esc}</p>`;
  }).join('');
}

function addMessage(role, content, isRefusal){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role + (isRefusal ? ' refusal' : '');
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'Вы' : 'Dequr Assistant';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'assistant'){
    bubble.innerHTML = renderAssistantContent(content);
  } else {
    bubble.innerHTML = renderPlainParagraphs(content);
  }
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function addThinking(){
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'thinking-el';
  wrap.innerHTML = '<div class="msg-label">Dequr Assistant</div><div class="bubble thinking">Думаю<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeThinking(){
  const el = document.getElementById('thinking-el');
  if (el) el.remove();
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  autoGrow();
  sendBtn.disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  addThinking();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await response.json();
    removeThinking();

    const textBlock = (data.content || []).map(b => b.text || '').join('\n').trim();
    const reply = textBlock || 'Извините, произошла ошибка при получении ответа. Попробуйте ещё раз.';
    const isRefusal = reply.includes('я лишь бот, созданный для помощи в освоении языка');
    addMessage('assistant', reply, isRefusal);
    history.push({ role: 'assistant', content: reply });
  } catch (err){
    removeThinking();
    addMessage('assistant', 'Не удалось получить ответ. Проверьте соединение и попробуйте снова.', true);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
